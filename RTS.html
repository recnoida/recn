<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: Arial;
    background: #111;
    color: white;
    margin: 0;
  }

  .container {
    padding: 20px;
    overflow-x: auto;
  }

  h2 { margin-bottom: 10px; }

  .controls { margin-bottom: 10px; }

  input {
    padding: 6px;
    width: 200px;
    max-width: 100%;
  }

  button {
    padding: 6px 10px;
    margin-left: 10px;
    cursor: pointer;
  }

  /* ✅ Mobile optimization wrapper */
  .table-wrapper {
    width: 100%;
    overflow-x: auto;
  }

  table {
    border-collapse: collapse;
    min-width: 900px;
    width: 100%;
  }

  th, td {
    padding: 8px;
    text-align: center;
    border: 1px solid #444;
    white-space: nowrap;
    font-size: 14px;
  }

  th {
    background: #333;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  tr:nth-child(even) { background: #222; }
  tr:nth-child(odd) { background: #1a1a1a; }
  tr:hover { background: #444; }

  .green { background: #198754 !important; }
  .yellow { background: #ffc107 !important; color: black; }
  .red { background: #dc3545 !important; }

  /* 📱 Mobile improvements */
  @media (max-width: 768px) {
    .container {
      padding: 10px;
    }

    th, td {
      padding: 6px;
      font-size: 12px;
    }

    input {
      width: 100%;
      margin-bottom: 8px;
    }

    button {
      width: 100%;
      margin: 5px 0 0 0;
    }
  }
</style>
</head>

<body>

<div class="container">

  <h2>RECN RTS 2026</h2>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search...">
    <button onclick="downloadCSV()">Download CSV</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="sheetData"></tbody>
    </table>
  </div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/18ty35FnXzOq0_W0a4Z3MXP3Dy729Tfa2/gviz/tq?tqx=out:json&gid=310771952&tq=select A,B,D,H,J,N,R,T,W,X";

let tableData = [];

fetch(url)
.then(res => res.text())
.then(rep => {

  const json = JSON.parse(rep.substring(47).slice(0, -2));
  const cols = json.table.cols;
  const rows = json.table.rows;

  let totalColIndex = cols.findIndex(c =>
    (c.label || "").toLowerCase().trim() === "total"
  );

  let tableRows = [];

  rows.forEach(r => {

    let rowArr = [];
    let totalValue = 0;

    if (totalColIndex !== -1) {
      let tCell = r.c[totalColIndex];
      totalValue = parseFloat(tCell ? (tCell.v || tCell.f) : 0) || 0;
    }

    for (let i = 0; i < cols.length; i++) {
      let cell = r.c[i];
      let value = cell ? (cell.f || cell.v || "") : "";
      rowArr.push(value);
    }

    tableRows.push({
      data: rowArr,
      total: totalValue
    });
  });

  // Sort high to low
  tableRows.sort((a, b) => b.total - a.total);

  // Header
  let headHTML = "<tr>";
  cols.forEach(col => {
    headHTML += `<th>${col.label || ""}</th>`;
  });
  headHTML += "</tr>";

  document.getElementById("tableHead").innerHTML = headHTML;

  // Rows
  let bodyHTML = "";

  tableRows.forEach(row => {

    let rowClass = "";

    if (row.total === 0) rowClass = "red";
    else if (row.total >= 40) rowClass = "green";
    else if (row.total >= 30) rowClass = "yellow";

    bodyHTML += `<tr class="${rowClass}">`;

    row.data.forEach(val => {
      bodyHTML += `<td>${val}</td>`;
    });

    bodyHTML += "</tr>";

    tableData.push(row.data);
  });

  document.getElementById("sheetData").innerHTML = bodyHTML;

});

// Search
document.getElementById("searchInput").addEventListener("keyup", function() {
  let filter = this.value.toLowerCase();
  document.querySelectorAll("#sheetData tr").forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
  });
});

// CSV download
function downloadCSV() {
  let csv = "";
  tableData.forEach(row => csv += row.join(",") + "\n");

  let blob = new Blob([csv], { type: "text/csv" });
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "recn_rts_2026.csv";
  a.click();
}

</script>

</body>
</html>
