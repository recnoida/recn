<script>
$(document).ready(function () {

  // 🔹 LOAD GOOGLE SHEET DATA
  const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ25uCJIKWbGvz43yf0QqIU8xYe3dPheh5gTkQwMoWTcDTWRgLcicvcPxNjTS_EZQ/pub?output=csv";

  $.get(sheetURL, function (data) {
    let rows = data.split("\n");
    let tableBody = "";

    rows.forEach((row, index) => {
      let cols = row.split(",");

      if (index === 0) return; // skip header

      tableBody += "<tr>";
      cols.forEach(col => {
        tableBody += "<td>" + col.trim() + "</td>";
      });
      tableBody += "</tr>";
    });

    $("#sheetData").html(tableBody);

    applyRowStyles(); // ✅ apply colors after loading
  });

  // 🔹 SEARCH FUNCTION (UNCHANGED)
  $('.search').on('keyup', function () {
    var searchTerm = $(this).val().toLowerCase();
    $('.dataframe tbody tr').each(function () {
      var lineStr = $(this).text().toLowerCase();
      if (lineStr.indexOf(searchTerm) === -1) {
        $(this).hide();
      } else {
        $(this).show();
      }
    });
  });

  // 🔹 EXPORT FUNCTION (UNCHANGED)
  document.getElementById('export').onclick = function () {
    var tableId = document.getElementById('dataTable').id;
    htmlTableToExcel(tableId, 'Data_Download');
  }

  var htmlTableToExcel = function (tableId, fileName = 'Data_Download') {

    var TableDataType = 'application/vnd.ms-excel';
    var selectTable = document.getElementById(tableId);
    var htmlTable = selectTable.outerHTML.replace(/ /g, '%20');

    fileName = fileName ? fileName + '.xlsx' : 'excel_table_data.xlsx';
    var excelFileURL = document.createElement("a");
    document.body.appendChild(excelFileURL);

    if (navigator.msSaveOrOpenBlob) {
      var blob = new Blob(["", htmlTable], { type: TableDataType });
      navigator.msSaveOrOpenBlob(blob, fileName);
    } else {
      excelFileURL.href = 'data:' + TableDataType + ', ' + htmlTable;
      excelFileURL.download = fileName;
      excelFileURL.click();
    }
  }

  // 🔹 APPLY COLORS (moved into function so it runs AFTER data load)
  function applyRowStyles() {

    $('#dataTable tbody tr').each(function () {
      var total = parseInt($(this).find('td:nth-child(10)').text());

      if (total > 39) {
        $(this).css('background-color', '#00AB66');
        $(this).css('color', 'white');
      }
    });

    $("#dataTable td").each(function () {
      if ($(this).text().trim() === "") {
        $(this).closest("tr").css('background-color', '#00AB66');
        $(this).closest("tr").css('color', 'white');
      }
    });

    $("#dataTable td").each(function () {
      if ($(this).text().trim() === "") {
        $(this).css('font-weight', 'bold');
      }
    });

  }

});
</script>
